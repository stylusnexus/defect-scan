name: CI

# Gate every PR and push to dev/main on the same checks a contributor runs locally:
# POSIX-shell syntax + the bats suite (the repo has no build step — bats IS the gate).
on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  test:
    # Matrix proves portability across GNU (ubuntu) AND BSD (macOS) userlands — macOS
    # ships BSD coreutils, so a GNU-only CI can be green while breaking on a user's Mac.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so tests that build temp git repos behave

      - name: Install bats + jq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install bats + jq (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq

      - name: Report shell + tool identity (portability visibility)
        run: |
          sh --version 2>&1 | head -n 1 || true
          echo "sed=$(command -v sed) awk=$(command -v awk) mktemp=$(command -v mktemp)"

      - name: Preflight (required tools present)
        run: sh skills/scan/lib/detect.sh preflight

      - name: Shell syntax check (POSIX sh)
        run: |
          for f in skills/scan/lib/detect.sh hooks/pre-commit-scan.sh \
                   scripts/setup-optional-tools.sh tests/fixtures/gh-stub/gh \
                   tests/eval/runners/claude.sh tests/eval/runners/codex.sh \
                   tests/fixtures/eval-runner-stub \
                   install.sh; do
            echo "sh -n $f"; sh -n "$f"
          done

      - name: Run test suite
        run: bats tests/detect.bats

  powershell:
    # Lint the Windows fallback shim so it can't rot. PSScriptAnalyzer catches the
    # smells a parse-only check misses (automatic-variable shadowing, unapproved
    # verbs, etc.). Native bats-on-Windows is a later step (Git-Bash matrix entry).
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint the Windows fallback shim (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable PSScriptAnalyzer)) {
            Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          }
          $r = Invoke-ScriptAnalyzer -Path windows/defect-scan.ps1 -Severity Warning,Error
          $r | Format-Table -AutoSize
          if ($r) { Write-Error "PSScriptAnalyzer found $($r.Count) issue(s)"; exit 1 }
          Write-Host "windows/defect-scan.ps1: clean"

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the scan covers every commit
      # Run the gitleaks CLI directly rather than gitleaks-action — the Action
      # requires a paid license for organization repos; the binary does not.
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: gitleaks (full-history secret scan)
        # Dogfood the bundled baseline: it allowlists vendored/build paths and the
        # well-known public demo keys our own test fixtures use, so this job flags only
        # genuine leaks (the same config the skill ships — see issue #20).
        run: gitleaks detect --source . --config skills/scan/gitleaks-baseline.toml --redact --no-banner
