name: release-please

# Automates the changelog + version bump on deployment. release-please watches
# `main` (where the deploy flow merges dev). When Conventional Commits land there,
# it opens/updates a release PR that prepends CHANGELOG.md and bumps the version in
# .claude-plugin/plugin.json; merging that PR tags the release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
